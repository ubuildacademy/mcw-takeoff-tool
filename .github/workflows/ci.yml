# CI: install, typecheck, build, lint, test (same install/build as Vercel)
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install server dependencies
        run: npm ci
        working-directory: server
      - name: Typecheck
        run: npm run typecheck
      - name: Build server
        run: npm run build
        working-directory: server
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
